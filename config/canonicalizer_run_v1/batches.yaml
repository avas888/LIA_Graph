    - q: "¿Las indemnizaciones laborales tributan?"
      must_cite: ["et.art.27"]
    - q: "¿Los dividendos de personas naturales son INR (no constitutivos de renta)?"
      must_cite: ["et.art.48", "et.art.49"]

