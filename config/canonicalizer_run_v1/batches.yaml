# canonicalizer_runv1.md — batch definitions
# ==========================================
# This is the canonical config for `scripts/canonicalizer/extract_vigencia.py --batch-id <X>`
# and `scripts/canonicalizer/run_batch_tests.py --batch-id <X>`.
#
# Each entry defines:
#   - batch_id          unique short id (A1, B7, ...)
#   - phase             A | B | C | D | E | F | G | H | I | J | K | L
#   - title             human-readable label
#   - wall_minutes_target  expected upper-bound (the runner does NOT enforce)
#   - depends_on        list of batch_ids that must complete first
#   - norm_filter       how to derive this batch's input set (see schema below)
#   - test_questions    list of accountant-style probes that exercise THIS batch
#
# norm_filter shapes:
#   type: prefix          { prefix: "ley.2277.2022." }                    # all norms whose canonical id starts with prefix
#   type: regex           { pattern: "^et\\.art\\.(5[5-7]\\d|580|580-2)$" }
#   type: et_article_range  { from: 555, to: "580-2" }                    # ET articles, inclusive (handles ET dashes)
#   type: explicit_list   { norm_ids: [...] }                             # exact list, useful for sub-units
#
# test_questions shape:
#   q                     accountant-phrased question (Spanish)
#   must_cite             optional list of norm_ids that should appear in the answer's citations
#   must_not_cite         optional list of norm_ids that must NOT appear (regression guards)
#   must_not_say          optional list of substrings that must NOT appear in the answer
#                         (e.g. "6 años" for the firmeza regression marker)
#   expected_chip_state   optional dict {norm_id: state} — the chip's `data-vigencia-state`
#                         that should render on the cited document's chip
#   notes                 free-form context for SME / engineer
#
# A test question PASSES when every must_cite norm appears AND no must_not_cite
# norm appears AND no must_not_say substring appears AND every expected chip
# matches. Soft FAILS (e.g. expected chip absent because the underlying norm
# wasn't in the batch yet) are logged as DEFERRED, not failed.

# ────────────────────────────────────────────────────────────────────────────
# PHASE A — Procedimiento tributario foundation
# ────────────────────────────────────────────────────────────────────────────

- batch_id: A1
  phase: A
  title: "ET procedimiento — declaraciones, RUT, plazos"
  wall_minutes_target: 15
  depends_on: []
  norm_filter:
    type: et_article_range
    from: 555
    to: "580-2"
  test_questions:
    - q: "¿Qué obligaciones impone el RUT a una S.A.S. nueva?"
      must_cite: ["et.art.555-2"]
    - q: "¿Quiénes están obligados a declarar renta para AG 2025?"
      must_cite: ["et.art.591", "et.art.592", "et.art.594-3"]
    - q: "¿Una persona natural extranjera sin residencia en Colombia debe presentar RUT?"
      must_cite: ["et.art.555-2"]
    - q: "¿Cuál es el formulario para personas jurídicas en renta?"
      must_cite: ["et.art.578"]

- batch_id: A2
  phase: A
  title: "ET firmeza, correcciones, beneficio de auditoría (689-3 VM)"
  wall_minutes_target: 15
  depends_on: [A1]
  norm_filter:
    type: explicit_list
    norm_ids:
      - et.art.588
      - et.art.589
      - et.art.590
      - et.art.594-1
      - et.art.594-3
      - et.art.689-1
      - et.art.689-3
      - et.art.705
      - et.art.714
  test_questions:
    - q: "¿Cuál es el plazo de firmeza de una declaración de renta con pérdidas?"
      must_not_say: ["6 años"]
      must_cite: ["et.art.147", "et.art.714"]
      notes: "§1.G regression marker — must NOT cite '6 años' for firmeza con pérdidas."
    - q: "¿Cómo corrijo una declaración para aumentar el saldo a pagar?"
      must_cite: ["et.art.588"]
    - q: "¿Aplica el beneficio de auditoría para AG 2025?"
      must_cite: ["et.art.689-3"]
      must_not_cite: ["et.art.689-1"]
      expected_chip_state:
        et.art.689-3: VM
      notes: "§1.G regression marker — Art. 689-1 was derogated by Ley 2155/2021; never cite as vigente."
    - q: "¿Qué término tiene la DIAN para revisar una declaración?"
      must_cite: ["et.art.705", "et.art.714"]

- batch_id: A3
  phase: A
  title: "ET sanciones (régimen general)"
  wall_minutes_target: 20
  depends_on: [A1]
  norm_filter:
    type: et_article_range
    from: 634
    to: 682
  test_questions:
    - q: "¿Cuánto es la sanción por inexactitud?"
      must_cite: ["et.art.647", "et.art.648"]
    - q: "¿Cómo calculo la sanción por extemporaneidad sin requerimiento?"
      must_cite: ["et.art.641"]
    - q: "¿Hay reducción por aceptación de sanción?"
      must_cite: ["et.art.709", "et.art.713"]
    - q: "¿Sanción por no enviar información en medios magnéticos?"
      must_cite: ["et.art.651"]

- batch_id: A4
  phase: A
  title: "ET devoluciones, compensaciones, intereses"
  wall_minutes_target: 15
  depends_on: [A1]
  norm_filter:
    type: et_article_range
    from: 815
    to: 866
  test_questions:
    - q: "¿Cómo solicito devolución de saldo a favor de IVA?"
      must_cite: ["et.art.815", "et.art.850"]
    - q: "¿Qué interés moratorio aplica a un pago tardío de retención?"
      must_cite: ["et.art.634", "et.art.635"]
    - q: "¿Puedo compensar saldo a favor de renta con IVA por pagar?"
      must_cite: ["et.art.815"]

# ────────────────────────────────────────────────────────────────────────────
# PHASE B — ET Renta (the heart of the corpus)
# ────────────────────────────────────────────────────────────────────────────

- batch_id: B1
