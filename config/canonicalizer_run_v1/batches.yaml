  wall_minutes_target: 30
  depends_on: []
  norm_filter:
    type: regex
    pattern: "^ley\\.1819\\.2016\\.art\\.([1-9]|[1-9]\\d|1[0-8]\\d|190)$"
  test_questions:
    - q: "¿Ley 1819 cómo modificó la residencia fiscal?"
      must_cite: ["ley.1819.2016.art.25"]
    - q: "¿Régimen ESAL post Ley 1819?"
      must_cite: ["ley.1819.2016.art.140"]

- batch_id: D4b
  phase: D
  title: "Ley 1819/2016 — segunda mitad (IVA + retefuente + sanciones)"
  wall_minutes_target: 30
  depends_on: [D4a]
  norm_filter:
    type: regex
    pattern: "^ley\\.1819\\.2016\\.art\\.(19[1-9]|[2-3]\\d{2}|[4-9]\\d{2})$"
  test_questions:
    - q: "¿Ley 1819 modificó la sanción por inexactitud?"
      must_cite: ["ley.1819.2016.art.287"]

- batch_id: D5
  phase: D
  title: "Ley 1943/2018 (cascade trigger; IE → reviviscencia)"
  wall_minutes_target: 25
  depends_on: []
  norm_filter:
    type: prefix
    prefix: "ley.1943.2018."
  test_questions:
    - q: "¿Ley 1943/2018 está vigente?"
      must_cite: ["ley.1943.2018", "sent.cc.C-481.2019"]
      expected_chip_state:
        ley.1943.2018: IE
      notes: "Acid test — every cited article must show IE chip + sentencia C-481/2019. Cascade orchestrator should fire."
