    - q: "¿Qué rentas exentas tienen las personas naturales?"
      must_cite: ["et.art.206"]
    - q: "¿Cómo calcular ganancia ocasional por herencia?"
      must_cite: ["et.art.302", "et.art.303"]
    - q: "¿Tarifa de ganancia ocasional para sucesiones en AG 2024?"
      must_cite: ["et.art.313", "et.art.314"]

- batch_id: B7
  phase: B
  title: "ET renta — tarifas (240 VM; 240-1 EC; the for_period acid test)"
  wall_minutes_target: 10
  depends_on: [B6]
  norm_filter:
    type: explicit_list
    norm_ids:
      - et.art.240
      - et.art.240-1
      - et.art.241
      - et.art.242
      - et.art.243
      - et.art.244
      - et.art.245
      - et.art.246
      - et.art.247
  test_questions:
    - q: "¿Cuál es la tarifa de renta para una S.A.S. en AG 2025?"
      must_cite: ["et.art.240"]
      expected_chip_state:
        et.art.240: VM
      notes: "Modificación por Ley 2277/2022 — chip blue."
    - q: "¿Aplicaba esa tarifa para AG 2022?"
      notes: "Acid test for resolver-2: Art. 338 CP shifts; AG 2022 must use the PRE-reform rate (33%)."
    - q: "¿Tarifa para usuarios industriales de zona franca que cumplieron antes del 13-dic-2022?"
      must_cite: ["et.art.240-1", "ley.2277.2022.art.11"]
      expected_chip_state:
        et.art.240-1: EC
      notes: "Sentencia C-384/2023 condicionó. Chip purple with literal Court text on hover."

- batch_id: B8
