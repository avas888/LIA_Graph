  wall_minutes_target: 30
  depends_on: [B7]
  norm_filter:
    type: prefix
    prefix: "ley.2277.2022."
  test_questions:
    - q: "¿Qué artículo de la Ley 2277 modificó la tarifa renta de S.A.S.?"
      must_cite: ["ley.2277.2022.art.10"]
    - q: "¿Art. 11 Ley 2277 sobre zonas francas — está vigente?"
      must_cite: ["ley.2277.2022.art.11"]
      expected_chip_state:
        ley.2277.2022.art.11: EC
    - q: "¿Art. 96 Ley 2277 derogó cuáles artículos del ET?"
      must_cite: ["ley.2277.2022.art.96", "et.art.158-1"]
    - q: "¿Qué impuesto al patrimonio creó la Ley 2277?"
      must_cite: ["ley.2277.2022.art.35"]

- batch_id: D2
  phase: D
  title: "Ley 2155/2021 (Reforma Tributaria 2021)"
  wall_minutes_target: 25
  depends_on: []
  norm_filter:
    type: prefix
    prefix: "ley.2155.2021."
  test_questions:
    - q: "¿Régimen simple modificaciones Ley 2155?"
      must_cite: ["ley.2155.2021.art.41", "ley.2155.2021.art.42"]
    - q: "¿Beneficio de auditoría — qué ley lo creó originalmente?"
      must_cite: ["ley.2155.2021.art.51"]

- batch_id: D3
