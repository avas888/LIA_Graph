    - q: "¿Una sociedad sin domicilio en Colombia paga renta en el país?"
      must_cite: ["et.art.12"]
    - q: "¿Qué ingresos de fuente extranjera tributan en Colombia?"
      must_cite: ["et.art.24", "et.art.25"]

